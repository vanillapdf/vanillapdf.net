name: Publish NuGet packages

on:
  push:
    tags:
      - 'v*.*.*'  # e.g., v2.0.0

permissions:
  contents: read
  packages: write  # Required for pushing to GitHub Packages

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      build_suffix: ${{ steps.parse.outputs.build_suffix }}

    steps:
      - name: Derive build suffix from tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          EXTRA=""
          
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(.*)$ ]]; then
            EXTRA="${BASH_REMATCH[1]}"
          fi
          
          if [[ -n "$EXTRA" ]]; then
            EXTRA="${EXTRA#-}"
            echo "build_suffix=$EXTRA" >> "$GITHUB_OUTPUT"
          else
            echo "build_suffix=" >> "$GITHUB_OUTPUT"
          fi

  build-nuget:
    needs: prepare
    uses: ./.github/workflows/build-nuget.yml
    with:
      build_suffix: ${{ needs.prepare.outputs.build_suffix }}

  publish-nuget-github:
    runs-on: ubuntu-latest
    environment:
      name: staging

    needs: build-nuget
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v7
        with:
          path: ./nupkgs

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push nupkgs/**/*.nupkg \
            --source "${{ vars.NUGET_SOURCE }}" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --skip-duplicate

  publish-nuget-official:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      id-token: write  # Enable GitHub OIDC token issuance for NuGet trusted publishing

    needs: publish-nuget-github
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v7
        with:
          path: ./nupkgs

      # Exchange the OIDC token for a short-lived nuget.org API key (valid 1 hour).
      # Requires a Trusted Publishing policy on nuget.org bound to this repo,
      # workflow file (publish-nuget-packages.yml) and the production environment.
      - name: NuGet login (OIDC -> temporary API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841  # v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: |
          dotnet nuget push nupkgs/**/*.nupkg \
            --source "${{ vars.NUGET_SOURCE }}" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --skip-duplicate
